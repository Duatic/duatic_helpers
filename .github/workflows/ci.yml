name: CI
on:
  workflow_dispatch:
    inputs:
      ros_distro:
        description: 'Distro to build'
        type: choice
        options: [all, jazzy, kilted, lyrical, rolling]
        default: all
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  schedule:
    # Run every morning at 01:00 to detect flakiness and broken dependencies
    - cron: '0 1 * * *'
      timezone: "Europe/Zurich"

jobs:
  ci:
    uses: Duatic/ci-workflows/.github/workflows/ci_orchestrator.yml@test/gist-badges-verify # TEMP: verification only, switch back to @v1 before merging
    with:
      ros_distro: ${{ inputs.ros_distro }}
      badge_gist_id: e89ebf1b2deb4b888b180f885719d8da
    secrets: inherit
